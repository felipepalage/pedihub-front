name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 82.29.58.99
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          script: |
            set -e
            cd /var/www/pedihub-app
            git pull origin main
            npm install
            npm run build:node
            pm2 startOrRestart ecosystem.config.cjs --update-env
            pm2 save
            echo "Deploy concluido!"
